<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAKHI Live Tracking 🛡️</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1f; color: white; }
    #header {
      background: #e11d48; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    #header h1 { font-size: 18px; }
    #status {
      padding: 8px 16px; background: #1a1a2e;
      font-size: 13px; color: #aaa; text-align: center;
    }
    #map { height: calc(100vh - 90px); width: 100%; }
    .pulse-icon {
      width: 20px; height: 20px; border-radius: 50%;
      background: #e11d48; border: 3px solid white;
      box-shadow: 0 0 0 rgba(225,29,72,0.6);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(225,29,72,0.6); }
      70% { box-shadow: 0 0 0 12px rgba(225,29,72,0); }
      100% { box-shadow: 0 0 0 0 rgba(225,29,72,0); }
    }
  </style>
</head>
<body>
  <div id="header">
    <span style="font-size:24px">🛡️</span>
    <h1>SAKHI — Live Location</h1>
  </div>
  <div id="status">🔴 Connecting to live feed...</div>
  <div id="map"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAgP5zfZdWrK7qdYIUOXklBRyf5mmqjb2c",
      authDomain: "sakhi-46fc5.firebaseapp.com",
      databaseURL: "https://sakhi-46fc5-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sakhi-46fc5",
      storageBucket: "sakhi-46fc5.firebasestorage.app",
      appId: "1:845725300818:web:09beef3c0011c9d050078b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid');
    const statusEl = document.getElementById('status');

    if (!uid) {
      statusEl.textContent = '❌ Invalid tracking link.';
    } else {
      const map = L.map('map').setView([20.5937, 78.9629], 5); // default India center

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      const pulseIcon = L.divIcon({
        className: '',
        html: '<div class="pulse-icon"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      });

      let marker = null;
      let firstUpdate = true;

      const locationRef = ref(db, `locations/${uid}`);
      onValue(locationRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) {
          statusEl.textContent = '⚠️ No live location data yet. Waiting...';
          return;
        }

        const { lat, lng, timestamp } = data;
        const time = new Date(timestamp).toLocaleTimeString();
        statusEl.textContent = `📍 Last updated: ${time} • Live tracking active`;

        if (!marker) {
          marker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map);
          marker.bindPopup('🚨 SAKHI Emergency Location').openPopup();
        } else {
          marker.setLatLng([lat, lng]);
        }

        if (firstUpdate) {
          map.setView([lat, lng], 16);
          firstUpdate = false;
        }
      });
    }
  </script>
</body>
</html>
